<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Kelly的博客 </title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,400,0,0"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="./assets/css/base.css">
    <link rel="stylesheet" href="./assets/css/main.css">

</head>

<body>

    <!-- 加载动画 -->
    <div id="loading-overlay">
        <div class="loader-card">
            <span class="material-symbols-rounded cat-icon">pets</span>
            <div id="tip-text" class="loading-text">正在检查猫粮储备...</div>
            <div class="md3-progress-track">
                <div class="md3-progress-indicator"></div>
            </div>
        </div>
    </div>

    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="#">La Soleil Blog</a>
            <div class="navbar-nav ml-auto">
                <a class="nav-link" href="./pages/archive.html">归档</a>
                <!-- <a class="nav-link" href="#">邻居</a> -->
                <a class="nav-link" href="./pages/about.html">关于</a>
            </div>
        </div>
    </nav>

    <!-- 主要内容 -->
    <div class="container" id="main-content">
        <div class="row">
            <div class="col-12 col-lg-8" id="post-list-container"></div>

            <div class="col-12 col-lg-4">
                <div class="avatar-box" id="profile-container"></div>
                <div class="avatar-box" id="notice-container"></div>
            </div>
        </div>
    </div>
    <!-- 主题切换按钮 -->
    <div id="theme-wrapper">
        <button id="theme-toggle" class="md3-switch" aria-label="切换主题">
            <div class="md3-switch__track">
                <div class="md3-switch__thumb">
                    <span class="material-icons"> </span>
                    <span class="material-icons"> </span>
                </div>
            </div>
        </button>
    </div>

    <div class="fab" onclick="meow()">🐾</div>
</body>
<!-- JS脚本 -->
<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
<script src="./assets/javascript/data.js"></script>
<script src="./assets/javascript/main.js"></script>

</html>
