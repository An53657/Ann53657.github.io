<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Kelly的博客 </title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,400,0,0" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="./assets/css/base.css">
    <link rel="stylesheet" href="./assets/css/main.css">
    <link rel="stylesheet" href="./assets/css/index.css">
</head>

<body>
    <!-- 加载遮罩 -->
    <div id="loading-overlay">
        <div class="loader-card">
            <span class="material-symbols-rounded cat-icon">pets</span>
            <div id="tip-text" class="loading-text">正在检查猫粮储备...</div>
            <div class="md3-progress-track">
                <div class="md3-progress-indicator"></div>
            </div>
        </div>
    </div>

    <!-- 主要内容 -->
    <div id="main-content" style="opacity: 0;"> 
        
        <nav class="navbar navbar-expand-lg navbar-light navbar-custom-navbar-lui">
            <a class="navbar-brand-navbar-lui font-weight-bold" href="#">La Soleil CMS</a>
            
            <button class="navbar-toggler border-0" type="button" data-toggle="collapse" data-target="#navbarNavLui">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNavLui">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item">
                        <a class="nav-link-navbar-lui" href="#">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link-navbar-lui" href="./pages/edit.html">归档</a>
                    </li>
                </ul>
            </div>
        </nav>
        <!-- 文章列表 -->
        <div class="container">
            <div class="row">
                <div class="col-12 col-lg-8" id="post-list-container"></div>

                <div class="col-12 col-lg-4">
                    <div class="avatar-box" id="profile-container"></div>
                    <div class="avatar-box" id="notice-container"></div>
                </div>
            </div>
        </div>
    </div>
    <!-- 主题切换 -->
    <div id="theme-wrapper">
        <button id="theme-toggle" class="md3-switch" aria-label="切换主题">
            <div class="md3-switch__track">
                <div class="md3-switch__thumb">
                    <span class="material-icons">light_mode</span>
                    <span class="material-icons">dark_mode</span>
                </div>
            </div>
        </button>
    </div>
    <!-- 这是猫咪 -->
    <div class="fab" onclick="meow()">🐾</div>

</body>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="./assets/javascript/data.js"></script>
<script src="./assets/javascript/index.js"></script>

</html>
