<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelly的博客</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vditor/dist/index.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="../assets/css/edit.css">
</head>
<body>

<div id="theme-wrapper">
    <div class="md3-switch" onclick="toggleDarkMode()">
        <div class="md3-switch__track">
            <div class="md3-switch__thumb">
                <i class="material-icons" id="theme-icon">light_mode</i>
            </div>
        </div>
    </div>
</div>

<nav class="navbar navbar-expand-lg navbar-light navbar-custom-navbar-lui">
    <a class="navbar-brand-navbar-lui font-weight-bold" href="#">La Soleil CMS</a>
    
    <button class="navbar-toggler border-0" type="button" data-toggle="collapse" data-target="#navbarNavLui">
        <span class="navbar-toggler-icon"></span>
    </button>
    
    <div class="collapse navbar-collapse" id="navbarNavLui">
        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <a class="nav-link-navbar-lui" href="#">首页</a>
            </li>
        </ul>
    </div>
</nav>
<div class="container-fluid px-md-5">
    <div class="row">
        <div class="col-12 col-xl-8">
            <div class="md3-card">
                <input type="text" id="postTitle" class="post-title-input" placeholder="在此输入文章标题..." oninput="syncPreview()">
                <div id="vditor"></div>
            </div>
        </div>

        <div class="col-12 col-xl-4">
            <div class="md3-card text-center">
                <div class="tag-badge" id="previewTag">预览模式</div>
                <h2 id="viewTitle" style="color: var(--md-on-surface);">未命名文章</h2>
                <p class="small opacity-50">发布于 <span id="viewDate">2026-05-09</span> · 阅读(0)</p>
                <div id="viewSummary" class="text-left mb-4" style="font-size: 0.95rem; line-height: 1.7;">
                    等待 Markdown 内容输入...
                </div>
                <button class="btn-md3-pill">阅读全文</button>
            </div>

            <div class="md3-card">
                <h5 class="mb-3" style="color: var(--md-on-surface);">数据存储 (JSON)</h5>
                <p class="small text-muted">路径建议：将文件放入 <code>/assets/js/data.js</code> 或 <code>/data/</code> 文件夹中进行归档。</p>
                <button class="btn btn-block btn-md3-pill" onclick="downloadMySQLJSON()">
                    <i class="fa-solid fa-download"></i> 导出 MySQL 兼容 JSON
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vditor/dist/index.min.js"></script>
<script src="../assets/javascript/edit.js"></script>

</body>
</html>
